<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết nghề nghiệp | Kareer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="step3.css">
    <style>
        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            background: #fdfdfd;
        }

        .timeline-view {
            min-height: 100vh;
            padding: 8rem 2rem 6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .timeline-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease;
        }

        .timeline-header h1 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #111;
            font-weight: 900;
        }

        .timeline-header p {
            font-family: var(--font-main);
            color: #666;
            font-size: 1.1rem;
            max-width: 600px;
        }

        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            padding: 0.8rem 1.5rem;
            background: #000;
            color: #fff;
            border-radius: 50px;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 0.85rem;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            background: #333;
        }

        .progress-timeline {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            max-width: 1100px;
            margin: 2rem 0 4rem;
            position: relative;
        }

        .progress-line {
            position: absolute;
            top: 12px;
            left: 12.5%;
            right: 12.5%;
            height: 4px;
            background: #e5e7eb;
            z-index: 1;
        }

        .progress-line-fill {
            position: absolute;
            top: 12px;
            left: 12.5%;
            height: 4px;
            background: #000;
            z-index: 1;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        .timeline-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
            z-index: 2;
            cursor: pointer;
        }

        .step-marker {
            width: 28px;
            height: 28px;
            background: #fff;
            border: 4px solid #e5e7eb;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 1.5rem;
        }

        .timeline-step.active .step-marker {
            border-color: #000;
            background: #000;
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .step-label {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #999;
            transition: color 0.4s ease;
            text-align: center;
            max-width: 140px;
            line-height: 1.4;
            letter-spacing: 0.05em;
        }

        .timeline-step.active .step-label {
            color: #111;
        }

        .detail-card {
            width: 100%;
            max-width: 800px;
            background: #fff;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            position: relative;
        }

        .detail-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .filter-box {
            background: #fff;
            padding: 1.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 600px;
            border: 1px solid #f0f0f0;
            z-index: 10;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
        }

        .select-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .select-group select {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            font-size: 1rem;
            color: #111;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff;
        }

        .select-group select:hover {
            border-color: #000;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .progress-timeline {
                flex-direction: column;
                align-items: flex-start;
                gap: 2rem;
                padding-left: 2rem;
            }

            .progress-line,
            .progress-line-fill {
                left: 32px;
                width: 4px !important;
                top: 0;
                bottom: 0;
                height: auto;
            }

            .timeline-step {
                flex-direction: row;
                gap: 1.5rem;
                align-items: center;
            }

            .step-marker {
                margin-bottom: 0;
            }

            .step-label {
                text-align: left;
                max-width: none;
            }
        }
    </style>
</head>

<body>
    <div class="tab-container">
        <a href="step3.html" class="tab-item">Mở lối sự nghiệp</a>
        <a href="#" class="tab-item active">Chi tiết nghề nghiệp</a>
        <a href="roadmap.html" class="tab-item">Lộ trình phát triển</a>
    </div>

    <div class="timeline-view">
        <a href="step3.html" class="back-btn"><span>← Quay lại</span></a>



        <div class="filter-box">
            <div class="select-group">
                <label>Vị trí công việc mục tiêu</label>
                <select id="role-filter">
                    <!-- Options populated by JS -->
                </select>
            </div>
        </div>

        <div class="progress-timeline" id="timeline">
            <div class="progress-line"></div>
            <div class="progress-line-fill" id="progress-fill"></div>

            <div class="timeline-step active" onclick="showStep(0)">
                <div class="step-marker"></div>
                <div class="step-label">Học viên / Thực tập</div>
            </div>
            <div class="timeline-step" onclick="showStep(1)">
                <div class="step-marker"></div>
                <div class="step-label">Chuyên viên sơ cấp</div>
            </div>
            <div class="timeline-step" onclick="showStep(2)">
                <div class="step-marker"></div>
                <div class="step-label">Chuyên viên chính</div>
            </div>
            <div class="timeline-step" onclick="showStep(3)">
                <div class="step-marker"></div>
                <div class="step-label">Quản lý / Chuyên gia</div>
            </div>
        </div>

        <div class="detail-card" id="detail-card">
            <div id="detail-content"></div>
        </div>
    </div>

    <script>
        const careerList = [
            "Kỹ sư phần mềm", "Chuyên viên Phân tích dữ liệu", "Nhà thiết kế UX/UI", 
            "Quản lý Dự án IT", "Chuyên viên Marketing số", "Kế toán trưởng", 
            "Chuyên viên Nhân sự", "Kiến trúc sư", "Bác sĩ Đa khoa", 
            "Chuyên viên Tư vấn Tài chính", "Nhà tâm lý học", "Kỹ sư Cơ khí", 
            "Kiểm toán viên", "Chuyên viên PR & Truyền thông", "Lập trình viên AI/ML", 
            "Quản lý Chuỗi cung ứng", "Nhà thiết kế thời trang", "Giáo viên Tiếng Anh", 
            "Chuyên viên Luật", "Doanh nhân / Founder", "Quản lý Khách sạn", 
            "Nhà khoa học dữ liệu"

        const roleCategories = {
            tech: ["Kỹ sư phần mềm", "Lập trình viên AI/ML", "Nhà khoa học dữ liệu", "Kỹ sư Cơ khí", "Quản lý Dự án IT", "Chuyên viên Phân tích dữ liệu"],
            creative: ["Nhà thiết kế UX/UI", "Nhà thiết kế thời trang", "Kiến trúc sư", "Chuyên viên PR & Truyền thông"],
            business: ["Chuyên viên Marketing số", "Kế toán trưởng", "Kiểm toán viên", "Quản lý Chuỗi cung ứng", "Chuyên viên Tư vấn Tài chính", "Quản lý Khách sạn", "Doanh nhân / Founder"],
            social: ["Chuyên viên Nhân sự", "Bác sĩ Đa khoa", "Nhà tâm lý học", "Giáo viên Tiếng Anh", "Chuyên viên Luật"]
        };

        const categorySkills = {
            tech: ["Lập trình ứng dụng", "Hệ quản trị CSDL", "Kiến trúc hệ thống", "Cloud Computing", "Cybersecurity"],
            creative: ["Tư duy thiết kế", "Sáng tạo nội dung", "Kỹ thuật đồ họa", "Nghiên cứu người dùng", "Truyền thông thị giác"],
            business: ["Quản trị dự án", "Phân tích thị trường", "Kỹ năng đàm phán", "Quản trị rủi ro", "Tư duy chiến lược"],
            social: ["Kỹ năng tham vấn", "Giao tiếp liên nhân", "Quản trị nhân sự", "Pháp luật & Đạo đức", "Thấu cảm & Hỗ trợ"]
        };

        function generateCustomTimeline(targetRole, profile) {
            const basePos = profile.position || "Người mới bắt đầu";
            const category = Object.keys(roleCategories).find(key => roleCategories[key].includes(targetRole)) || 'business';
            const skills = categorySkills[category];

            return [
                {
                    title: `Thử việc (${basePos} Transition)`, time: "0 - 6 tháng",
                    desc: `Tận dụng nền tảng <strong>${basePos}</strong> để làm quen với quy trình mới và thiết lập các mối quan hệ chuyên môn ban đầu.`,
                    tasks: ["Tìm hiểu quy trình nội bộ", "Làm chủ bộ công cụ làm việc", "Hỗ trợ các dự án đang triển khai", "Thiết lập mục tiêu cá nhân"]
                },
                {
                    title: `Nhân viên ${targetRole}`, time: "6 tháng - 2 năm",
                    desc: `Trở thành thành viên nòng cốt, độc lập xử lý các tác vụ chuyên môn về <strong>${skills[0]}</strong> và <strong>${skills[1]}</strong>.`,
                    tasks: [`Xử lý ${skills[0]} độc lập`, "Nâng cao hiệu suất làm việc", "Phối hợp liên phòng ban", "Đề xuất sáng kiến cải tiến"]
                },
                {
                    title: `Chuyên viên ${targetRole} cấp cao`, time: "2 - 5 năm",
                    desc: `Dẫn dắt các mảng công việc phức tạp, mentor cho thế hệ mới và làm chủ <strong>${skills[2]}</strong> cùng <strong>${skills[3]}</strong>.`,
                    tasks: [`Quản lý ${skills[2]} chiến lược`, "Giải quyết các vấn đề kỹ thuật khó", "Đào tạo và hướng dẫn Junior", "Tối ưu quy trình vận hành"]
                },
                {
                    title: `Lãnh đạo / Chuyên gia ${targetRole}`, time: "5 năm +",
                    desc: `Định hình tầm nhìn phát triển lâu dài, chịu trách nhiệm về <strong>${skills[4]}</strong> và chiến lược tăng trưởng bền vững.`,
                    tasks: ["Hoạch định chiến lược dài hạn", "Quản trị rủi ro & Nguồn lực", "Xây dựng văn hóa chuyên môn", "Đạt các KPI chiến lược"]
                }
            ];
        }

        const timelineDataByRole = {
            'Nhà thiết kế UX/UI': [
                {
                    title: "Thực tập sinh (Intern)", time: "0 - 6 tháng",

                    tasks: ["Xây dựng Design System", "Phân tích dữ liệu người dùng", "Tối ưu hóa trải nghiệm chuyển đổi", "Phản biện và bảo vệ thiết kế"]

                    tasks: ["Định hướng trải nghiệm thương hiệu", "Quản lý nguồn lực thiết kế", "Xây dựng chiến lược sản phẩm", "Đào tạo và phát triển đội ngũ"]
                }
            ],
            'Giáo viên Tiếng Anh': [
                {
                    title: "Trợ giảng / Giáo viên tập sự", time: "0 - 1 năm",
                    desc: "Học hỏi phương pháp quản lý lớp học, hỗ trợ soạn giáo án và làm quen với các bộ giáo trình chuẩn quốc tế.",
                    tasks: ["Quản lý nề nếp lớp học", "Hỗ trợ chấm bài & chỉnh phát âm", "Soạn bài giảng bổ trợ", "Tham gia các buổi training sư phạm"]
                },
                {
                    title: "Giáo viên chính thức", time: "1 - 3 năm",
                    desc: "Đứng lớp độc lập, chịu trách nhiệm về chất lượng đầu ra của học viên và nâng cao kỹ năng sư phạm chuyên sâu.",
                    tasks: ["Giảng dạy các lớp mục tiêu", "Luyện thi IELTS/TOEIC/SAT", "Xây dựng giáo trình cá nhân hóa", "Tư vấn lộ trình học tập"]
                },
                {
                    title: "Tổ trưởng bộ môn", time: "3 - 7 năm",
                    desc: "Quản lý chất lượng giảng dạy của tổ, đào tạo giáo viên mới và phát triển các sản phẩm giáo dục mới.",
                    tasks: ["Dự giờ & góp ý chuyên môn", "Thiết kế khung chương trình học", "Quản lý đội ngũ giáo viên", "Tổ chức hội thảo chuyên đề"]
                },
                {
                    title: "Giám đốc đào tạo / Hiệu trưởng", time: "7 năm +",
                    desc: "Định hướng chiến lược phát triển học thuật, quản trị vận hành trung tâm/trường học và xây dựng thương hiệu giáo dục.",

                },
                {
                    title: "Middle Software Engineer", time: "2 - 5 năm",
                    desc: "Đảm nhận các tính năng phức tạp, tự chủ trong việc thiết kế module và bắt đầu hỗ trợ các thành viên mới.",

                },
                {
                    title: "Senior / Tech Lead", time: "5 - 8 năm",
                    desc: "Quyết định kiến trúc hệ thống, giải quyết các vấn đề kỹ thuật khó và dẫn dắt đội ngũ kỹ thuật về mặt chuyên môn.",
                    tasks: ["Thiết kế kiến trúc hệ thống", "Review kiến trúc & bảo mật", "Giải quyết tech debt", "Quản lý tiến độ kỹ thuật"]
                },
                {
                    title: "Software Architect / CTO", time: "8 năm +",
                    desc: "Định hướng công nghệ cho toàn công ty, đưa ra các quyết định chiến lược về hạ tầng và xây dựng văn hóa kỹ thuật.",
                    tasks: ["Xây dựng chiến lược công nghệ", "Quản lý ngân sách IT", "Tuyển dụng & giữ chân nhân tài", "Tối ưu hóa quy trình R&D"]
                }
            ],
            'default': [
                {
                    title: "Thực tập / Thử việc", time: "0 - 6 tháng",
                    desc: "Tiếp cận môi trường chuyên nghiệp, học hỏi nền tảng cơ bản và hoàn thiện các kỹ năng thiết yếu trong ngành.",
                    tasks: ["Tìm hiểu quy trình", "Làm chủ công cụ làm việc", "Hỗ trợ dự án", "Báo cáo cập nhật công việc"]
                },
                {
                    title: "Nhân viên thực hiện", time: "6 tháng - 2 năm",
                    desc: "Độc lập giải quyết các công việc chuyên môn, đóng góp vào mục tiêu chung và xây dựng tư duy phản biện.",
                    tasks: ["Xử lý tác vụ độc lập", "Phối hợp làm việc nhóm", "Tối ưu hoá hiệu suất", "Đóng góp sáng kiến cải tiến"]
                },
                {

                    desc: "Nắm vững chuyên môn sâu, dẫn dắt các dự án quan trọng và đóng vai trò cầu nối trong đội ngũ.",
                    tasks: ["Quản lý dự án chuyên môn", "Giải quyết vấn đề phức tạp", "Mentor thành viên mới", "Phân tích dữ liệu hiệu quả"]
                },
                {
                    title: "Lãnh đạo / Chuyên gia cấp cao", time: "5 năm +",
                    desc: "Định hình tầm nhìn, quản trị rủi ro và chịu trách nhiệm tối thượng về thành quả chiến lược.",
                    tasks: ["Hoạch định chiến lược", "Quản trị nguồn lực", "Xây dựng văn hóa", "Đạt mục tiêu tổ chức"]
                }
            ]

        let currentActiveStep = 0;

        function initDropdown() {
            const roleFilter = document.getElementById('role-filter');
            roleFilter.innerHTML = careerList.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const selectedCareer = localStorage.getItem('selectedCareer');
            if (selectedCareer && careerList.includes(selectedCareer)) {
                roleFilter.value = selectedCareer;
            }

            roleFilter.addEventListener('change', () => {
                localStorage.setItem('selectedCareer', roleFilter.value);
                updateStepLabels();
                showStep(currentActiveStep);
            });
        }

        function updateStepLabels() {
            const role = document.getElementById('role-filter').value;
            const profile = JSON.parse(localStorage.getItem('kareer_profile') || '{}');
            const dataList = generateCustomTimeline(role, profile);
            const labels = document.querySelectorAll('.step-label');
            labels.forEach((label, i) => {
                if (dataList[i]) {
                    label.textContent = dataList[i].title;
                }
            });
        }

        function showStep(index) {
            currentActiveStep = index;
            const steps = document.querySelectorAll('.timeline-step');
            const fill = document.getElementById('progress-fill');
            const card = document.getElementById('detail-card');
            const content = document.getElementById('detail-content');
            const role = document.getElementById('role-filter').value;

            const quizResult = JSON.parse(localStorage.getItem('kareer_result') || '{}');
            const userScores = quizResult.scores || {};
            const profile = JSON.parse(localStorage.getItem('kareer_profile') || '{}');
            
            const topTraits = Object.entries(userScores)
                .sort(([, a], [, b]) => b - a)
                .slice(0, 2)
                .map(([trait]) => trait);

            const traitLabels = {
                realistic: 'Thực tế (R)', investigative: 'Nghiên cứu (I)', artistic: 'Nghệ thuật (A)',
                social: 'Xã hội (S)', enterprising: 'Quản lý (E)', conventional: 'Nghiệp vụ (C)'
            };

            steps.forEach((s, i) => {
                if (i <= index) s.classList.add('active');
                else s.classList.remove('active');
            });

            const percentage = (index / (steps.length - 1)) * 75;
            fill.style.width = `${percentage}%`;

            const dataList = generateCustomTimeline(role, profile);
            const data = dataList[index];
            
            card.classList.remove('show');

            // Personalize Insight
            let personalInsight = "";
            if (index === 0) {
                personalInsight = `Dựa trên phân tích, bạn có lợi thế lớn nhờ sự kết hợp giữa <strong>${traitLabels[topTraits[0]]}</strong> và nền tảng <strong>${profile.position || 'của mình'}</strong>. Hãy tập trung khai thác điểm này để gây ấn tượng trong giai đoạn đầu.`;
            } else {
                personalInsight = `Với tư duy <strong>${traitLabels[topTraits[0]]}</strong>, bạn sẽ dễ dàng làm chủ các kỹ năng cần thiết ở giai đoạn này nếu biết cách liên kết chúng với các dự án thực tế.`;
            }

            setTimeout(() => {
                content.innerHTML = `
                    <div class="detail-header">
                        <div class="detail-title"><h2>${data.title}</h2></div>
                        <span class="detail-time">${data.time}</span>
                    </div>
                    <div class="detail-body">
                        <div style="margin-bottom: 2rem; padding: 1.2rem; background: #f0f7ff; border-radius: 12px; border: 1px solid #cce3ff; font-size: 0.95rem; line-height: 1.6; color: #004a99;">
                            <strong style="display: block; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">💡 Phân tích từ Kareer</strong>
                            ${personalInsight}
                        </div>
                        <h3>Mục tiêu giai đoạn</h3>
                        <p>${data.desc}</p>
                        <h3>Kỹ năng & Nhiệm vụ cốt lõi</h3>
                        <div class="task-list">
                            ${data.tasks.map(t => `<div class="task-item"><span class="task-icon">✔</span> ${t}</div>`).join('')}
                        </div>
                    </div>
                `;
                card.classList.add('show');
            }, 300);
        }

        initDropdown();
        updateStepLabels();
        showStep(0);
    </script>
</body>
</html>
