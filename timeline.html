<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết nghề nghiệp | Kareer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        * { font-family: Arial, Helvetica, sans-serif !important; }
    </style>
    <link rel="stylesheet" href="step3.css">
    <style>
        :root {
            --font-main: Arial, Helvetica, sans-serif;
            --font-heading: Arial, Helvetica, sans-serif;
        }

        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            background: #fdfdfd;
            font-family: Arial, sans-serif;
        }

        button, input, select, textarea {
            font-family: inherit;
        }

        .timeline-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease;
        }

        .timeline-header h1 {
            font-size: 3.2rem;
            margin-bottom: 0.8rem;
            color: #111;
            font-weight: 900;
        }

        .timeline-header p {
            color: #666;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .tab-container {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: #fff;
            border: 2px solid #000;
            border-radius: 100px;
            width: fit-content;
            z-index: 2000;
            box-shadow: 8px 8px 0px #000;
        }

        .tab-item {
            padding: 0.7rem 1.8rem;
            border-radius: 100px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: Arial, sans-serif;
            color: #000;
            background: transparent;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .tab-item:hover {
            background: #f0f0f0;
        }

        .tab-item.active {
            background: #000;
            color: #fff;
        }

        .timeline-view {
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            margin: 0 auto;
            padding: 8rem 2rem 5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .details-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .detail-card {
            width: 100%;
            background: #fff;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            border: 2px solid #000;
            animation: cardSlideUp 0.6s ease forwards;
            position: relative;
        }

        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-step-tag {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: #000;
            color: #fff;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .detail-header {
            text-align: left;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 1.5rem;
        }

        .detail-header h2 {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            color: #111;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3rem;
            width: 100%;
        }

        .detail-col h3 {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            color: #111;
        }

        .bullet-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .bullet-list li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.8rem;
            font-size: 1rem;
            color: #333;
            line-height: 1.6;
        }

        .bullet-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            font-weight: bold;
            color: #000;
            font-size: 1.2rem;
        }

        .personal-insight-box {
            background: #f8f9fa;
            border-left: 5px solid #000;
            padding: 2rem;
            margin-top: 3rem;
            border-radius: 0 16px 16px 0;
        }

        .insight-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .insight-header h4 {
            font-size: 1.1rem;
            font-weight: 800;
            margin: 0;
            color: #000;
            text-transform: uppercase;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 3rem;
        }

        .btn-roadmap {
            background: #000;
            color: #fff;
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-roadmap:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .filter-box {
            background: #fff;
            padding: 1.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            margin-bottom: 2rem;
            width: 100%;
            max-width: 600px;
            border: 2px solid #000;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .select-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
        }

        .select-group select {
            padding: 0.8rem;
            border-radius: 12px;
            border: 2px solid #000;
            font-size: 1rem;
            font-weight: 600;
            background: #fff;
        }

        @media (max-width: 992px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .tab-container {
                top: 0.5rem;
                width: 95%;
                padding: 0.2rem;
                gap: 5px;
            }

            .tab-item {
                padding: 0.25rem 0.5rem;
                font-size: 0.55rem;
            }

            .timeline-view {
                padding-top: 60px;
                padding-left: 0.5rem;
                padding-right: 0.5rem;
            }

            .timeline-header h1 {
                font-size: 1.2rem;
            }

            .filter-box {
                padding: 0.5rem;
                margin-bottom: 1rem;
                border-radius: 8px;
            }

            .select-group label {
                font-size: 0.6rem;
            }

            .select-group select {
                padding: 0.5rem;
                font-size: 0.8rem;
                border-radius: 8px;
            }

            .detail-card {
                padding: 0.8rem;
                border-radius: 8px;
            }

            .detail-card h2 {
                font-size: 1.1rem;
            }

            .detail-col h3 {
                font-size: 0.85rem;
            }

            .detail-col p, .detail-col li {
                font-size: 0.75rem;
            }

            .main-header {
                left: 0.5rem !important;
                top: 0.5rem !important;
            }

            .main-header img {
                height: 20px !important;
            }
        }
    </style>
</head>

<body>
    <header class="main-header" style="position: absolute; top: 1.5rem; left: 2rem; z-index: 100;">
        <a href="index.html">
            <img src="KAREER.png" alt="Kareer Logo" style="height: 40px;">
        </a>
    </header>

    <div class="tab-container">
        <a href="step2.html" class="tab-item">Kết quả phân tích</a>
        <a href="step3.html" class="tab-item">Định hướng</a>
        <a href="#" class="tab-item active">Chi tiết nghề nghiệp</a>
        <a href="roadmap.html" class="tab-item">Lộ trình phát triển</a>
    </div>

    <div class="timeline-view">
        <header class="timeline-header">
            <h1 id="timeline-title">Chi tiết Nghề nghiệp</h1>

        </header>

        <div class="filter-box">
            <div class="select-group">
                <label>Công việc mục tiêu</label>
                <select id="role-filter"></select>
            </div>
        </div>

        <div class="details-container" id="details-container"></div>
    </div>

    <script>
        const careerList = [
            "Giám đốc Công nghệ (CTO) / Kiến trúc sư trưởng",
            "Trưởng phòng Phân tích dữ liệu chiến lược",
            "Giám đốc Trải nghiệm (CXO) / Giám đốc Nghệ thuật",
            "Giám đốc Quản lý Dự án & Vận hành IT",
            "Giám đốc Marketing số",
            "Giám đốc Tài chính (CFO)",
            "Giám đốc Nhân sự (CHRO)",
            "Kiến trúc sư trưởng / Chủ trì thiết kế cấp cao",
            "Giám đốc Y khoa / Chuyên gia Tư vấn Cấp cao",
            "Đối tác Quản lý Tài sản Cấp cao (Wealth Manager)",
            "Chuyên gia Tư vấn Chiến lược Sức khỏe Tinh thần",
            "Trưởng phòng Kỹ thuật / Chuyên gia Tư vấn Công nghiệp",
            "Giám đốc Kiểm toán / Đối tác (Partner)",
            "Giám đốc Truyền thông & Thương hiệu",
            "Chuyên gia Nghiên cứu AI / Giám đốc Khoa học",
            "Giám đốc Chuỗi cung ứng (CSO)",
            "Giám đốc Sáng tạo / Chủ sở hữu thương hiệu thời trang",
            "Chuyên gia Ngôn ngữ / Giám đốc Học thuật",
            "Giám đốc Pháp chế / Luật sư điều hành",
            "Chủ tịch Hội đồng Quản trị / Tổng Giám đốc (CEO)",
            "Giám đốc Điều hành Khách sạn / Khu nghỉ dưỡng",
            "Trưởng khoa học dữ liệu (Chief Data Scientist)"
        ];

        const roleCategories = {
            tech: [
                "Giám đốc Công nghệ (CTO) / Kiến trúc sư trưởng",
                "Trưởng phòng Phân tích dữ liệu chiến lược",
                "Giám đốc Quản lý Dự án & Vận hành IT",
                "Chuyên gia Nghiên cứu AI / Giám đốc Khoa học",
                "Trưởng khoa học dữ liệu (Chief Data Scientist)"
            ],
            creative: [
                "Giám đốc Trải nghiệm (CXO) / Giám đốc Nghệ thuật",
                "Kiến trúc sư trưởng / Chủ trì thiết kế cấp cao",
                "Giám đốc Sáng tạo / Chủ sở hữu thương hiệu thời trang"
            ],
            business: [
                "Giám đốc Marketing số",
                "Giám đốc Tài chính (CFO)",
                "Đối tác Quản lý Tài sản Cấp cao (Wealth Manager)",
                "Giám đốc Kiểm toán / Đối tác (Partner)",
                "Giám đốc Truyền thông & Thương hiệu",
                "Giám đốc Chuỗi cung ứng (CSO)",
                "Chủ tịch Hội đồng Quản trị / Tổng Giám đốc (CEO)",
                "Giám đốc Điều hành Khách sạn / Khu nghỉ dưỡng"
            ],
            social: [
                "Giám đốc Nhân sự (CHRO)",
                "Giám đốc Y khoa / Chuyên gia Tư vấn Cấp cao",
                "Chuyên gia Tư vấn Chiến lược Sức khỏe Tinh thần",
                "Chuyên gia Ngôn ngữ / Giám đốc Học thuật",
                "Giám đốc Pháp chế / Luật sư điều hành"
            ]
        };

        const categorySkills = {
            tech: ["Lập trình ứng dụng", "Hệ quản trị CSDL", "Kiến trúc hệ thống", "Cloud Computing", "Cybersecurity"],
            creative: ["Tư duy thiết kế", "Sáng tạo nội dung", "Kỹ thuật đồ họa", "Nghiên cứu người dùng", "Truyền thông thị giác"],
            business: ["Quản trị dự án", "Phân tích thị trường", "Kỹ năng đàm phán", "Quản trị rủi ro", "Tư duy chiến lược"],
            social: ["Kỹ năng tham vấn", "Giao tiếp liên nhân", "Quản trị nhân sự", "Pháp luật & Đạo đức", "Thấu cảm & Hỗ trợ"]
        };

        function generateCustomTimeline(targetRole) {
            const category = Object.keys(roleCategories).find(key => roleCategories[key].includes(targetRole)) || 'business';
            
            const specializedData = {
                'Giám đốc Trải nghiệm (CXO) / Giám đốc Nghệ thuật': {
                    title: "Giám đốc Trải nghiệm (CXO) / Giám đốc Nghệ thuật",
                    desc: "Tham gia vào ban điều hành để định hướng tương lai sản phẩm. Chịu trách nhiệm về sự thành công lâu dài của trải nghiệm khách hàng và giá trị thương hiệu toàn cầu.",
                    requirements: ["Kinh nghiệm quản lý cấp C-level", "Uy tín cao trong cộng đồng thiết kế quốc tế", "Tư duy quản trị doanh nghiệp vĩ mô"],
                    skills: ["Corporate Strategy", "Innovation Leadership", "Global Branding"],
                    tasks: ["Hoạch định chiến lược trải nghiệm khách hàng", "Xây dựng mạng lưới đối tác chiến lược", "Cố vấn cho HĐQT về đổi mới sáng tạo", "Định hình tiêu chuẩn trải nghiệm của ngành"]
                },
                'Giám đốc Công nghệ (CTO) / Kiến trúc sư trưởng': {
                    title: "Giám đốc Công nghệ (CTO) / Kiến trúc sư trưởng",
                    desc: "Xây dựng chiến lược công nghệ dài hạn cho doanh nghiệp. Định hướng hạ tầng, bảo mật và văn hóa kỹ thuật cấp tập đoàn.",
                    requirements: ["Kinh nghiệm quản lý kỹ thuật cấp cao", "Tầm nhìn chiến lược công nghệ toàn cầu", "Khả năng hoạch định ngân sách IT"],
                    skills: ["Technology Strategy", "Engineering Leadership", "Cybersecurity Governance"],
                    tasks: ["Xây dựng Tech Roadmap 5-10 năm", "Quản trị nguồn lực và tài năng IT", "Cố vấn cho HĐQT về xu hướng tech", "Định hình tiêu chuẩn kỹ thuật bền vững"]
                },
                'Giám đốc Tài chính (CFO)': {
                    title: "Giám đốc Tài chính (CFO)",
                    desc: "Quản trị tối cao nguồn lực tài chính của doanh nghiệp. Tham mưu chiến lược đầu tư, quản trị rủi ro và đảm bảo sự bền vững tài chính toàn tổ chức.",
                    requirements: ["Chứng chỉ quốc tế (CPA/CFA)", "Kinh nghiệm quản lý tài chính tập đoàn", "Tư duy chiến lược kinh doanh"],
                    skills: ["Financial Strategy", "Investment Analysis", "Risk Management"],
                    tasks: ["Hoạch định cấu trúc tài chính doanh nghiệp", "Xây dựng chiến lược vốn và đầu tư", "Quản trị quan hệ với nhà đầu tư", "Giám sát tuân thủ và kiểm soát nội bộ"]
                }
            };

            const data = specializedData[targetRole] || {
                title: targetRole,
                desc: `Vị trí lãnh đạo cao nhất trong lĩnh vực chuyên môn. Định hình tầm nhìn dài hạn và chiến lược phát triển bền vững cho tổ chức.`,
                requirements: ["Kinh nghiệm quản lý cấp cao", "Tầm nhìn chiến lược ngành", "Kỹ năng lãnh đạo và mentor"],
                skills: categorySkills[category],
                tasks: ["Hoạch định chiến lược tăng trưởng", "Xây dựng vị thế cạnh tranh", "Thiết lập tiêu chuẩn chuyên môn", "Đại diện tổ chức trong các quan hệ đối tác"]
            };

            return data;
        }

        function render() {
            const role = document.getElementById('role-filter').value;
            const data = generateCustomTimeline(role);
            const riasec = JSON.parse(localStorage.getItem('kareer_riasec') || '{"topTraits":["enterprising","social"]}');
            

            
            const traitLabels = {
                realistic: 'Thực tế (R)', investigative: 'Nghiên cứu (I)', artistic: 'Nghệ thuật (A)',
                social: 'Xã hội (S)', enterprising: 'Quản lý (E)', conventional: 'Nghiệp vụ (C)'
            };

            document.getElementById('details-container').innerHTML = `
                <div class="detail-card">
                    <div class="detail-step-tag">MỤC TIÊU CAO NHẤT</div>
                    <div class="detail-header">
                        <h2>${data.title}</h2>
                    </div>
                    
                    <div class="detail-grid">
                        <section class="detail-col">
                            <h3>Mô tả công việc</h3>
                            <p>${data.desc}</p>
                            <h3>Yêu cầu nghề nghiệp</h3>
                            <ul class="bullet-list">${data.requirements.map(r => `<li>${r}</li>`).join('')}</ul>
                        </section>

                        <section class="detail-col">
                            <h3>Công việc chính</h3>
                            <ul class="bullet-list">${data.tasks.map(t => `<li>${t}</li>`).join('')}</ul>
                            <h3>Kỹ năng quan trọng</h3>
                            <ul class="bullet-list">${data.skills.map(s => `<li>${s}</li>`).join('')}</ul>
                        </section>
                    </div>

                    <div class="personal-insight-box">
                        <div class="insight-header">
                            <span class="insight-icon">✨</span>
                            <h4>Phân tích từ Kareer AI</h4>
                        </div>
                        <p>Tại đích đến <strong>${role}</strong> cấp cao, tố chất <strong>${traitLabels[riasec.topTraits[0]]}</strong> sẽ giúp bạn định hình tầm nhìn chiến lược. Đây là vị trí tối ưu để bạn phát huy tối đa tiềm năng bản thân.</p>
                    </div>

                    <div class="card-footer">
                        <a href="roadmap.html" class="btn-roadmap">Xem lộ trình thăng tiến →</a>
                    </div>
                </div>
            `;
        }

        const roleFilter = document.getElementById('role-filter');
        roleFilter.innerHTML = careerList.map(c => `<option value="${c}">${c}</option>`).join('');
        roleFilter.value = localStorage.getItem('selectedCareer') || careerList[0];
        roleFilter.onchange = (e) => {
            localStorage.setItem('selectedCareer', e.target.value);
            render();
        };

        window.onload = render;
    </script>
</body>
</html>
